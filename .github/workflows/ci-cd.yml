name: CI/CD

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check .

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Build Docker Image
    runs-on: self-hosted
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: powershell
        run: |
          $repository = "${env:REGISTRY}/${env:GITHUB_REPOSITORY}".ToLowerInvariant()
          "repository=$repository" >> $env:GITHUB_OUTPUT

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.image.outputs.repository }}:${{ github.sha }}

  sonar:
    name: SonarQube Scan
    runs-on: self-hosted
    needs: [test, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .

      - name: SonarQube scan
        shell: powershell
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          $scannerHostUrl = $env:SONAR_HOST_URL `
            -replace "localhost", "host.docker.internal" `
            -replace "127.0.0.1", "host.docker.internal"

          docker run --rm `
            -e SONAR_HOST_URL="$scannerHostUrl" `
            -e SONAR_TOKEN="$env:SONAR_TOKEN" `
            -v "${PWD}:/usr/src" `
            sonarsource/sonar-scanner-cli:latest

      - name: SonarQube quality gate
        shell: powershell
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          $reportTaskPath = ".scannerwork/report-task.txt"
          if (-not (Test-Path $reportTaskPath)) {
            throw "SonarQube report task file was not created: $reportTaskPath"
          }

          $task = @{}
          Get-Content $reportTaskPath | ForEach-Object {
            if ($_ -match "^(.*?)=(.*)$") {
              $task[$matches[1]] = $matches[2]
            }
          }

          $ceTaskUrl = $task["ceTaskUrl"] `
            -replace "host.docker.internal", "localhost"

          $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("$env:SONAR_TOKEN`:"))
          $headers = @{ Authorization = "Basic $auth" }

          for ($attempt = 1; $attempt -le 30; $attempt++) {
            $ceTask = Invoke-RestMethod -Uri $ceTaskUrl -Headers $headers
            $status = $ceTask.task.status
            Write-Host "SonarQube background task status: $status"

            if ($status -eq "SUCCESS") {
              break
            }

            if ($status -in @("FAILED", "CANCELED")) {
              throw "SonarQube background task ended with status $status"
            }

            Start-Sleep -Seconds 5
          }

          if ($status -ne "SUCCESS") {
            throw "Timed out waiting for SonarQube background task"
          }

          $analysisId = $ceTask.task.analysisId
          $qualityGateUrl = "$env:SONAR_HOST_URL/api/qualitygates/project_status?analysisId=$analysisId"
          $qualityGate = Invoke-RestMethod -Uri $qualityGateUrl -Headers $headers
          $gateStatus = $qualityGate.projectStatus.status
          Write-Host "SonarQube quality gate status: $gateStatus"

          if ($gateStatus -ne "OK") {
            throw "SonarQube quality gate failed with status $gateStatus"
          }

  push:
    name: Push Docker Image
    runs-on: self-hosted
    needs: sonar
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: image_name
        shell: powershell
        run: |
          $repository = "${env:REGISTRY}/${env:GITHUB_REPOSITORY}".ToLowerInvariant()
          "repository=$repository" >> $env:GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image_name.outputs.repository }}:${{ github.sha }}
            ${{ steps.image_name.outputs.repository }}:latest

      - name: Export image tag
        id: image
        shell: powershell
        run: |
          "image=${{ steps.image_name.outputs.repository }}:${{ github.sha }}" >> $env:GITHUB_OUTPUT

  deploy:
    name: Deploy on Windows Runner
    runs-on: self-hosted
    needs: push
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR for local deployment
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Run local Blue-Green deployment
        shell: powershell
        env:
          IMAGE: ${{ needs.push.outputs.image }}
          VM_APP_DIR: ${{ secrets.VM_APP_DIR }}
        run: .\scripts\deploy-blue-green.ps1 -Image "$env:IMAGE"
