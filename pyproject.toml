[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q"

[tool.coverage.run]
source = ["app"]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = true

[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [
    "venv",
    ".venv",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
